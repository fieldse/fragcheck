# CVE dataset for fragcheck.
#
# The five primary entries are populated from the project's source-of-truth
# knowledgebase (page-cache-write LPE family, 2022-2026) and marked verified.
# Per the knowledgebase, advisory IDs and a few stable point-releases were
# single-sourced; re-validate against distro security trackers before treating
# any single verdict as authoritative.
#
# The three legacy entries remain verified: false (provisional ranges).
#
# Schema: see internal/cve/types.go.

cves:
  # ---- Primary: page-cache-write privilege-escalation family ----

  - id: CVE-2022-0847
    nickname: Dirty Pipe
    advisory: RHSB-2022-002
    cvss: 7.8
    kev: true
    verified: true
    description: >-
      Uninitialized pipe-buffer flag allows a page-cache write that overwrites
      read-only / SUID files, leading to root. No CONFIG, module, or userns
      precondition — every shell user on a vulnerable kernel is an attacker.
    introduced: "5.8"
    branches:
      - {series: "5.16", fixed: "5.16.11"}
      - {series: "5.15", fixed: "5.15.25"}
      - {series: "5.10", fixed: "5.10.102"}
    distro_fixed:
      debian:
        "11": "5.10.103-1"   # bullseye (DSA-5092-1); buster/stretch not affected
      ubuntu: {}             # per kernel stack (HWE 5.13<5.13.0-35.40, OEM 5.14<5.14.0-1027.30); GA 5.4/4.15 not affected
      rhel:
        "9": "5.14.0-0"      # RHEL 9 shipped patched at GA; RHEL 8 patched via RHSA-2022:0825; RHEL 7 not affected
    preconditions:
      modules: []
      configs: []
      needs_unpriv_userns: false
    remediation: >-
      Patch only — reboot required. SELinux/AppArmor/seccomp and kpatch do NOT
      mitigate (core pipe code, not modularizable). Upstream fixes: 5.16.11 /
      5.15.25 / 5.10.102.

  - id: CVE-2026-31431
    nickname: Copy Fail
    advisory: GHSA-2274-3hgr-wxv6
    cvss: 7.8   # CVSS HIGH per RHSB-2026-002; exact base score not recorded
    kev: false
    verified: true
    description: >-
      algif_aead AF_ALG crypto logic bug gives a deterministic 4-byte
      page-cache write, leading to root. No unprivileged user namespaces needed,
      so disabling userns does not mitigate.
    introduced: "4.14"
    branches:
      - {series: "5.10", fixed: "5.10.254"}
      - {series: "5.15", fixed: "5.15.204"}
      - {series: "6.1",  fixed: "6.1.174"}
      - {series: "6.6",  fixed: "6.6.137"}
      - {series: "6.12", fixed: "6.12.85"}
      - {series: "6.18", fixed: "6.18.22"}
    distro_fixed:
      ubuntu:
        "22.04": "5.15.0-179.189"
        "24.04": "6.8.0-117.117"
      debian:
        "11": "5.10.257-1"
        "12": "6.1.174-1"
        "13": "6.12.90-2"
      rhel:
        "8": "4.18.0-553.123.1.el8_10"
        "9": "5.14.0-611.54.1.el9_7"
    preconditions:
      modules: [algif_aead]
      configs: [CONFIG_CRYPTO_USER_API_AEAD]
      needs_unpriv_userns: false
    remediation: >-
      Patch (reboot). Built-in (RHEL family): boot param
      initcall_blacklist=algif_aead_init — modprobe blacklist is useless.
      Module (=m): install algif_aead /bin/false + update-initramfs -u. Per
      service: systemd RestrictAddressFamilies=~AF_ALG.

  - id: CVE-2026-43284
    nickname: Dirty Frag (ESP)
    advisory: RHSB-2026-003
    cvss: 8.8   # kernel.org; CISA-ADP scores it 7.8
    kev: true
    verified: true
    description: >-
      In-place ESP/IPsec decryption over unowned skb fragments writes into the
      page cache, leading to root. Actively exploited in the wild. Requires
      CAP_NET_ADMIN obtained via an unprivileged user namespace.
    introduced: "4.11"
    branches:
      - {series: "5.10", fixed: "5.10.255"}
      - {series: "5.15", fixed: "5.15.206"}
      - {series: "6.1",  fixed: "6.1.172"}
      - {series: "6.6",  fixed: "6.6.138"}
      - {series: "6.12", fixed: "6.12.87"}
      - {series: "6.18", fixed: "6.18.28"}
      - {series: "7.0",  fixed: "7.0.5"}
    distro_fixed:
      ubuntu:
        "22.04": "5.15.0-181.191"
        "24.04": "6.8.0-124.124"
      debian:               # debian security-tracker (CVE-2026-43284)
        "11": "5.10.251-4"
        "12": "6.1.170-3"
        "13": "6.12.86-1"
      rhel:
        "8":  "4.18.0-553.123.2.el8_10"
        "9":  "5.14.0-611.54.3.el9_7"
        "10": "6.12.0-124.55.3.el10_1"
    preconditions:
      modules: [esp4, esp6]
      configs: [CONFIG_INET_ESP, CONFIG_XFRM]
      needs_unpriv_userns: true
    remediation: >-
      Patch (reboot). Where IPsec is unused, blacklist esp4/esp6
      (install ... /bin/false) — breaks IPsec VPN. Red Hat preferred where
      IPsec is needed: disable unprivileged userns
      (user.max_user_namespaces=0) — blocks this path but NOT the RxRPC variant.

  - id: CVE-2026-43500
    nickname: Dirty Frag (RxRPC)
    advisory: RHSB-2026-003
    cvss: 7.8
    kev: true
    verified: true
    description: >-
      The Dirty Frag in-place-decrypt flaw in the RxRPC/AFS path: an OOB
      page-cache write reachable purely through unprivileged syscalls (no userns,
      no CAP_NET_ADMIN). Absent from RHEL 8 / Alma 8. Works where the ESP path is
      blocked.
    introduced: "5.3"
    branches:
      - {series: "5.10", fixed: "5.10.255"}
      - {series: "5.15", fixed: "5.15.206"}
      - {series: "6.1",  fixed: "6.1.172"}
      - {series: "6.6",  fixed: "6.6.138"}
      - {series: "6.12", fixed: "6.12.87"}
      - {series: "6.18", fixed: "6.18.29"}
      - {series: "7.0",  fixed: "7.0.6"}
    distro_fixed:
      ubuntu:
        "22.04": "5.15.0-181.191"
        "24.04": "6.8.0-124.124"
      debian:               # debian security-tracker (CVE-2026-43500)
        "11": "5.10.257-1"
        "12": "6.1.174-1"
        "13": "6.12.90-2"
      rhel:
        "9":  "5.14.0-611.54.3.el9_7"
        "10": "6.12.0-124.55.3.el10_1"
    preconditions:
      modules: [rxrpc]
      configs: [CONFIG_AF_RXRPC]
      needs_unpriv_userns: false
    remediation: >-
      Patch (reboot). Where AFS/RxRPC is unused, blacklist rxrpc
      (install rxrpc /bin/false + update-initramfs -u / dracut -f). Disabling
      userns does NOT mitigate this variant.

  - id: CVE-2026-46300
    nickname: Fragnesia
    advisory: RHSB-2026-003
    cvss: 7.8
    kev: false
    verified: true
    description: >-
      XFRM ESP-in-TCP (espintcp) loses the SKBFL_SHARED_FRAG flag — a regression
      created by the Dirty Frag patch — allowing a page-cache write to root.
      Requires the Dirty Frag fix to be present (or never patched). Needs
      unprivileged user namespaces.
    introduced: "5.6"
    branches:
      - {series: "5.10", fixed: "5.10.258"}
      - {series: "5.15", fixed: "5.15.208"}
      - {series: "6.1",  fixed: "6.1.174"}
      - {series: "6.6",  fixed: "6.6.141"}
      - {series: "6.12", fixed: "6.12.91"}
      - {series: "7.0",  fixed: "7.0.10"}
    distro_fixed:
      ubuntu:
        "22.04": "5.15.0-181.191"
        "24.04": "6.8.0-124.124"
        "25.10": "6.17.0-35.35"
        "26.04": "7.0.0-22.22"
      debian:
        "11": "6.1.174-1~deb11u1"
        "12": "6.1.174-1"
        "13": "6.12.90-2"
      rhel:
        "8":  "4.18.0-553.124.3.el8_10"
        "9":  "5.14.0-611.54.5.el9_7"
        "10": "6.12.0-124.56.3.el10_1"
    unaffected_distros: [amazon]   # espintcp absent from Amazon Linux kernels
    preconditions:
      modules: [esp4, esp6]
      configs: [CONFIG_INET_ESPINTCP, CONFIG_XFRM, CONFIG_INET_ESP]
      needs_unpriv_userns: true
    remediation: >-
      Patch (reboot). Blacklist esp4/esp6 (install ... /bin/false) — breaks
      IPsec ESP. Disable unprivileged userns (user.max_user_namespaces=0) —
      breaks rootless containers. Ubuntu 23.10+
      kernel.apparmor_restrict_unprivileged_userns=1 blocks the public PoC.

  - id: CVE-2026-43503
    nickname: DirtyClone
    advisory: USN-8373-1   # bundled Ubuntu fix; no DirtyClone-specific RHSB/DSA number found standalone
    cvss: 8.8   # kernel.org CNA; Red Hat ADP scores it 7.0
    kev: false  # confirmed NOT in CISA KEV (live feed, catalogVersion 2026.06.29)
    # verified: false — branch data is kernel.org-authoritative, but distro_fixed.rhel
    # is unknown (RHEL 9/10 "Affected", no errata indexed yet) and SUSE data was
    # single-sourced. Re-validate before flipping to true. See
    # docs/research/detection-dirtyclone-cve-2026-43503.md
    verified: false
    description: >-
      Frag-transfer helpers (__pskb_copy_fclone, skb_shift, and others) fail to
      propagate the SKBFL_SHARED_FRAG marker when cloning an skb. ESP input
      (esp4/esp6) then decrypts in place into page-cache pages it does not own —
      a routed nft 'dup to <local>' / xt_TEE clone reaches esp_input() with the
      marker stripped, giving an unprivileged user a page-cache write to root.
      Fourth entry in the 2026 shared-frag LPE cluster.
    # kernel.org traces "introduced" to 3.9, but the flaw is only exploitable once
    # the SKBFL_SHARED_FRAG mechanism exists (born from the Dirty Frag fix). Kernels
    # predating that are covered by the CVE-2026-43284/-43500 entries, not this one.
    introduced: "3.9"
    branches:
      - {series: "5.10", fixed: "5.10.257"}   # kernel.org fix commit fbeab9555564
      - {series: "5.15", fixed: "5.15.208"}   # kernel.org fix commit 179f1852bded
      - {series: "6.1",  fixed: "6.1.174"}    # kernel.org fix commit 12401fcfb01f
      - {series: "6.6",  fixed: "6.6.141"}    # kernel.org fix commit 989214c66884
      - {series: "6.12", fixed: "6.12.91"}    # kernel.org fix commit fc6eb39c55e9
      - {series: "6.18", fixed: "6.18.33"}    # kernel.org fix commit ff375cc75f91
      - {series: "7.0",  fixed: "7.0.10"}     # kernel.org fix commit 9bc9d6d69672
      # mainline: v7.1 (v7.1-rc5) fix commit 48f6a5356a33
    distro_fixed:
      ubuntu:                # ubuntu.com/security/CVE-2026-43503 + USN-8373-1
        "22.04": "5.15.0-181.191"
        "24.04": "6.8.0-124.124"
        "25.10": "6.17.0-35.35"
        "26.04": "7.0.0-22.22"
      debian:                # security-tracker.debian.org/tracker/CVE-2026-43503
        "11": "5.10.257-1"    # DLA-4606-1
        "12": "6.1.174-1"     # DSA-6306-1
        "13": "6.12.94-1"     # DSA-6295-1
      rhel: {}                 # UNKNOWN — RHEL 9/10 "Affected", no errata indexed; RHEL 6/7/8 not affected
    unaffected_distros: []
    preconditions:
      # esp4/esp6 only — unlike CVE-2026-43500, rxrpc is NOT part of this variant's
      # demonstrated path. Do not inherit the sibling entry's rxrpc precondition.
      modules: [esp4, esp6]
      configs: [CONFIG_XFRM, CONFIG_INET_ESP, CONFIG_INET6_ESP]
      needs_unpriv_userns: true
    remediation: >-
      Patch (reboot) to a kernel carrying commit 48f6a5356a33 or its stable
      backport. Where IPsec ESP is unused, blacklist esp4/esp6
      (install ... /bin/false) — breaks IPsec VPN. Disabling unprivileged userns
      (user.max_user_namespaces=0) closes the default CAP_NET_ADMIN path but not
      exploitation by a process that already holds CAP_NET_ADMIN.

  - id: CVE-2026-46331
    nickname: pedit COW
    advisory: RHSB-2026-008
    cvss: 7.8   # kernel.org CNA; Red Hat ADP scores it 6.7 (PR:H)
    kev: false  # not in CISA KEV as of 2026-07-01; CISA ADP ssvc Exploitation: poc
    # verified: false — fix is ~2 weeks old: no 6.1.x/6.6.x branch backport yet, RHEL
    # NVRs not indexed, and Debian 11's tracker entry is a suspected false-positive
    # (5.10 predates v5.18). See docs/research/detection-peditcow-cve-2026-46331.md
    verified: false
    description: >-
      Out-of-bounds write in net/sched act_pedit (tcf_pedit_act): a pedit key
      whose target offset is resolved at runtime escapes the copy-on-write bounds
      check, writing past the private copy into the shared page-cache page backing
      a SUID binary — root. Same page-cache-COW outcome as Dirty Pipe, but via the
      tc (traffic-control) subsystem, not IPsec/fragment paths.
    introduced: "5.18"   # culprit commit 899ee91156e5; fixed mainline v7.1-rc7
    branches:
      # 6.1.x and 6.6.x have NO fix in the CNA record yet — hosts on those LTS
      # series correctly fall to the upstream-branch fallback (likely-vulnerable).
      - {series: "6.12", fixed: "6.12.94"}   # kernel.org CNA; matches Debian trixie 6.12.94-1
      - {series: "6.18", fixed: "6.18.36"}   # kernel.org CNA (no distro corroboration)
      - {series: "7.0",  fixed: "7.0.13"}    # kernel.org CNA; matches Debian sid 7.0.13-1
    distro_fixed:
      ubuntu: {}             # all of 18.04–26.04 listed vulnerable, no fixed package as of 2026-06-30
      debian:                # security-tracker.debian.org/tracker/CVE-2026-46331
        "13": "6.12.94-1"     # DSA-6355-1; 11/12 not fixed (11 is a suspected tracker false-positive)
      rhel: {}                 # RHEL 8/9/10 affected (RHSA errata issued) but fixed NVRs not indexed; RHEL 6/7 not affected
    unaffected_distros: []     # RHEL 6/7 and Ubuntu ≤16.04 fall out via the introduced: 5.18 lower bound
    preconditions:
      # act_pedit is the hard gate. The PoC's cls_basic/em_meta classifier auto-falls
      # back to matchall (near-universal), so do NOT gate on those — would false-mitigate RHEL.
      modules: [act_pedit]
      configs: [CONFIG_NET_SCHED, CONFIG_NET_CLS_ACT, CONFIG_NET_ACT_PEDIT]
      needs_unpriv_userns: true
    remediation: >-
      Patch (reboot). Where tc pedit rules are unused, blacklist act_pedit
      (install act_pedit /bin/true) — breaks traffic shaping/header rewriting.
      Disable unprivileged userns (user.max_user_namespaces=0 /
      kernel.unprivileged_userns_clone=0). On Ubuntu 24.04+ the AppArmor userns
      sysctls block the public PoC path but the kernel itself stays vulnerable.

